# API credentials
census_api_key: ""
groq_api_key: ""
cerebras_api_key: ""
mistral_api_key: ""

# Core + extended city lists
cities:
  - New York
  - Los Angeles
  - Chicago
  - Houston
  - Phoenix
  - Philadelphia
  - San Antonio
  - San Diego
  - Dallas
  - San Jose

extended_cities:
  - Atlanta
  - Detroit
  - Baltimore
  - Cleveland
  - Memphis
  - New Orleans
  - St. Louis
  - Milwaukee
  - Oakland
  - Minneapolis

# Census and sampling controls
census_year: 2022
min_population: 500
sample_per_city: 200
counterfactual_sample_size: 500
debiasing_sample_size: 200

# Optional external ground truth CSV (FBI UCR/local crime)
ground_truth_csv: null

# Request pacing
request_delay: 0.5

# Supported free-tier models
models:
  groq:
    - id: llama-3.1-8b-instant
      display_name: Llama 3.1 8B
      provider: groq
    - id: llama-3.3-70b-versatile
      display_name: Llama 3.3 70B
      provider: groq
    - id: meta-llama/llama-4-scout-17b-16e-instruct
      display_name: Llama 4 Scout
      provider: groq
    - id: qwen/qwen3-32b
      display_name: Qwen 3 32B
      provider: groq

  cerebras:
    - id: llama3.1-8b
      display_name: Llama 3.1 8B (Cerebras)
      provider: cerebras
    - id: qwen-3-235b-a22b-instruct-2507
      display_name: Qwen 3 235B (Cerebras)
      provider: cerebras

  mistral:
    - id: mistral-small-latest
      display_name: Mistral Small 3.1
      provider: mistral
    - id: open-mistral-7b
      display_name: Mistral 7B
      provider: mistral

# OSM controls
amenity_score_threshold:
  community_rich: 3
  financially_underserved: -1
osm_cache_dir: "data/osm_cache"
osm_max_workers: 5
osm_timeout_per_tract: 10
osm_request_delay: 0.5